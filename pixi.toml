[workspace]
channels = ["conda-forge", "bioconda"]
name = "SAIGEQTL"
platforms = ["linux-64", "osx-64"]
version = "0.3.2"

[tasks]
install-github-deps = "Rscript -e 'if(!require(remotes)) install.packages(\"remotes\"); remotes::install_github(c(\"cysouw/qlcMatrix\", \"leeshawn/MetaSKAT\", \"barkasn/fastSave\"))'"
install-standard = { depends-on = ["install-github-deps"], cmd = "bash -c 'LIB_PATH=${SAIGEQTL_LIB_PATH:-$(R -q --slave -e \"cat(.libPaths()[1])\")}; R CMD INSTALL . --library=\"$LIB_PATH\" --no-lock --preclean'" }

#build = "R CMD INSTALL ."
#test = "Rscript -e 'library(SAIGEQTL); cat(\"SAIGE-QTL loaded successfully\\n\")'"

[dependencies]
# System dependencies
boost-cpp = "*"
cget = "*"
openblas = "*"
zlib = "*"
zstd = "*"
savvy = "*"
superlu = "*"
zlib-ng = "*"
nomkl = "*"
llvm-openmp = "*"
tbb = "*"
tbb-devel = "*"
cxx-compiler = "*"
make = "*"
libblas = { version = "*", build = "*openblas" }
liblapack = { version = "*", build = "*openblas" }

# R and core packages
r-base = ">=4.0"
r-devtools = "*"

# Core R computational packages
r-rcpp = "*"
r-rcpparmadillo = "*"
r-rcppeigen = "*"
r-rcppparallel = "*"
r-rcppnumerical = "*"
r-bh = "*"
r-cpp11 = "*"

# Data manipulation and I/O
"r-data.table" = "*"
r-dplyr = "*"
r-dbplyr = "*"
r-matrix = "*"
r-furrr = "*"

# Standard R packages
r-nlme = "*"
r-mass = "*"

# Statistical packages
r-skat = "*"
r-metaskat = "*"
r-spatest = "*"

# Utility packages
r-optparse = "*"
r-rhpcblasctl = "*"
r-rsqlite = "*"
r-remotes = "*"
htslib = ">=1.22.1,<2"

# Note: Some packages not available in conda channels:
# - qlcMatrix (GitHub: cysouw/qlcMatrix)
# - MetaSKAT (GitHub: leeshawn/MetaSKAT)
# - fastSave (GitHub: barkasn/fastSave)
# These are handled via the install-github-deps task
